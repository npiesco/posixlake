name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Check code formatting
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # Run Clippy linter
  clippy:
    name: Clippy Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # Build on multiple platforms
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - name: Build
        run: cargo build --workspace --verbose
      - name: Build Release
        run: cargo build --workspace --release --verbose
      - name: Verify build metadata
        shell: bash
        run: |
          ./target/release/posixlake-cli --version

  # Unit tests on multiple platforms
  test-unit:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - name: Run unit tests
        run: cargo test --lib --verbose

  # Core integration tests (auth, backup/restore, monitoring, NFS core)
  test-core-integration:
    name: Core Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Auth and RBAC tests
        run: cargo test --test auth_test --verbose
      - name: Backup and restore tests
        run: cargo test --test backup_restore_test --verbose
      - name: Monitoring tests
        run: cargo test --test monitoring_test --verbose
      - name: NFS core tests
        run: cargo test --test nfs_test --verbose
      - name: Recovery tests
        run: cargo test --test recovery_test --verbose
      - name: Schema migration tests
        run: cargo test --test schema_migration_test --verbose
      - name: Upgrade compatibility tests
        run: cargo test --test upgrade_compat_test --verbose
      - name: Failure drill tests
        run: cargo test --test failure_drill_test --verbose
      - name: Ops CLI tests
        run: cargo test --test ops_cli_test --verbose

  # Extended integration tests
  test-extended-integration:
    name: Extended Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Delta native tests
        run: cargo test --test delta_native_test --verbose
      - name: Merge tests
        run: cargo test --test merge_test --verbose
      - name: Optimize tests
        run: cargo test --test optimize_test --verbose
      - name: Vacuum tests
        run: cargo test --test vacuum_test --verbose
      - name: ZOrder tests
        run: cargo test --test zorder_test --verbose
      - name: Time travel tests
        run: cargo test --test time_travel_test --verbose
      - name: Write buffer tests
        run: cargo test --test write_buffer_test --verbose
      - name: Data skipping tests
        run: cargo test --test data_skipping_test --verbose
      - name: Import tests
        run: |
          cargo test --test csv_import_test --verbose
          cargo test --test parquet_import_test --verbose
      - name: Query and schema tests
        run: |
          cargo test --test query_schema_test --verbose
          cargo test --test csv_schema_test --verbose
          cargo test --test complex_types_test --verbose
          cargo test --test column_stats_test --verbose
      - name: Transaction tests
        run: cargo test --test explicit_transaction_test --verbose

  # S3 integration tests with MinIO (Linux only)
  test-s3-integration:
    name: S3 Integration Tests (Docker + MinIO)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Start MinIO
        run: |
          docker run -d \
            --name minio \
            -p 9000:9000 \
            -p 9001:9001 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest \
            server /data --console-address ":9001"

          # Wait for MinIO to be ready
          timeout 30 bash -c 'until curl -f http://localhost:9000/minio/health/live; do sleep 1; done'

      - name: Setup MinIO bucket
        run: |
          docker run --rm --network=host --entrypoint /bin/sh \
            minio/mc:latest \
            -c "mc alias set myminio http://localhost:9000 minioadmin minioadmin && mc mb myminio/posixlake-test || true"

      - name: Run S3 integration tests
        env:
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: posixlake-test
        run: cargo test --test s3_test --verbose

      - name: Stop MinIO
        if: always()
        run: docker stop minio && docker rm minio

  # Dependency vulnerability audit
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run cargo audit
        run: cargo audit --deny warnings

  # SBOM generation
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx
      - name: Generate CycloneDX SBOM
        run: cargo cyclonedx --format json --output-pattern bom
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: "**/bom.json"

  # Documentation build
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build documentation
        run: cargo doc --no-deps --workspace --verbose

  # Release gate - all required checks must pass
  release-gate:
    name: Release Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - fmt
      - clippy
      - build
      - test-unit
      - test-core-integration
      - test-extended-integration
      - test-s3-integration
      - audit
      - sbom
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.fmt.result }}" != "success" ] || \
             [ "${{ needs.clippy.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.test-unit.result }}" != "success" ] || \
             [ "${{ needs.test-core-integration.result }}" != "success" ] || \
             [ "${{ needs.test-extended-integration.result }}" != "success" ] || \
             [ "${{ needs.test-s3-integration.result }}" != "success" ] || \
             [ "${{ needs.audit.result }}" != "success" ] || \
             [ "${{ needs.sbom.result }}" != "success" ]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All release gate checks passed"

  # Publish Python bindings to PyPI (only on main branch)
  publish-python:
    name: Publish Python Bindings
    runs-on: ${{ matrix.os }}
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [release-gate]
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            lib: libposixlake.so
          - os: macos-latest
            target: x86_64-apple-darwin
            lib: libposixlake.dylib
          - os: macos-latest
            target: aarch64-apple-darwin
            lib: libposixlake.dylib
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            lib: posixlake.dll
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            lib: posixlake.dll
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install setuptools wheel twine uniffi-bindgen

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Build Rust library
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target }} -p posixlake
          ls -la target/${{ matrix.target }}/release/ | grep libposixlake || echo "Library not found!"

      - name: Generate UniFFI bindings
        shell: bash
        run: |
          if [ ! -f "target/${{ matrix.target }}/release/${{ matrix.lib }}" ]; then
            echo "Error: Library not found at target/${{ matrix.target }}/release/${{ matrix.lib }}"
            exit 1
          fi
          cd posixlake
          cargo run --bin uniffi-bindgen -- generate \
            --library ../target/${{ matrix.target }}/release/${{ matrix.lib }} \
            --language python \
            --out-dir ../bindings/python/posixlake

      - name: Copy library to bindings
        shell: bash
        run: |
          # Copy to posixlake package directory
          cp target/${{ matrix.target }}/release/${{ matrix.lib }} bindings/python/posixlake/
          echo "Contents of bindings/python/posixlake/:"
          ls -lh bindings/python/posixlake/
          # Verify library was copied
          if [ ! -f "bindings/python/posixlake/${{ matrix.lib }}" ]; then
            echo "Error: Library file not found in bindings/python/posixlake/"
            exit 1
          fi

      - name: Build Python wheel
        shell: bash
        run: |
          cd bindings/python
          # Only build sdist on Linux to avoid duplicate uploads
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            python setup.py sdist bdist_wheel --plat-name manylinux2014_x86_64
          else
            python setup.py bdist_wheel
          fi
          ls -lh dist/

      - name: Verify wheel contents
        shell: bash
        run: |
          cd bindings/python
          pip install wheel
          wheel_file=$(ls dist/*.whl | head -1)
          echo "Inspecting wheel: $wheel_file"
          python -m zipfile -l "$wheel_file" | grep -E "\.(dylib|so|dll)" || echo "WARNING: No native library found in wheel!"

      - name: Generate checksums
        shell: bash
        run: |
          cd bindings/python/dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Sign release artifacts
        shell: bash
        run: |
          cd bindings/python/dist
          for artifact in *; do
            if [ -f "$artifact" ]; then
              cosign sign-blob --yes "$artifact" \
                --output-signature "$artifact.sig" \
                --output-certificate "$artifact.pem"
            fi
          done

      - name: Upload signed release bundle
        uses: actions/upload-artifact@v4
        with:
          name: python-release-bundle-${{ matrix.target }}
          path: bindings/python/dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          cd bindings/python
          twine upload dist/* --skip-existing
