[advisories]
ignore = [
    "RUSTSEC-2025-0141", # bincode is a direct dependency, but no maintained drop-in replacement is in use yet.
    "RUSTSEC-2025-0057", # fxhash comes from sled, which remains in the storage stack.
    "RUSTSEC-2024-0384", # instant is pulled in by sled's parking_lot 0.11 dependency.
    "RUSTSEC-2024-0436", # paste is pulled in transitively by parquet/datafusion.
    "RUSTSEC-2025-0134", # rustls-pemfile is pulled in transitively by object_store.
]
